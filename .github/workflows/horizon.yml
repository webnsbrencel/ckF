name: gentle

on:
  push:

jobs:
  talent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        advance: ["incentive", "enrich", "sanction", "insist", "fog"]
        needy: ["outcome", "perspective", "socialize", "trail"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar vW.jar
